id: 342-which-model-is-used-now
title: Informational model question must not run /model
intent_class: chat_handoff
input:
  prompt: which model is being used now?
session:
  has_prior_state: false
  configured_integrations: []
  resolved_integrations: {}
notes:
- 'Repro for the REPL bug where "which model is being used now?" was routed to a
  deterministic-looking slash_invoke("/model") instead of being answered in chat.'
- The provider/model is already available to the assistant via session context, so
  an informational status question should be answered conversationally, not by
  executing /model and ending the turn with no answer.
- Prompt is sent verbatim; do not normalize punctuation.
turn:
  expected_kind: agent
policy:
  executes_terminal_action: false
planned_actions:
- kind: assistant_handoff
  content: chat:current_model_question
  source: llm
response_contract:
  must_contain_any:
  - model
  - provider
  must_not_contain:
  - $ /
  - can't help
  - cannot help
history:
  expected:
  - type: cli_agent
    ok: true
runs: 3
tool_actions:
- surface: gather
  tools:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
  expect: not_called
