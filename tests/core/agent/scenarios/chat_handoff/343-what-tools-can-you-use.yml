id: 343-what-tools-can-you-use
title: Informational tool capability question must not run /tools
intent_class: chat_handoff
input:
  prompt: what tools can you use?
session:
  has_prior_state: false
  configured_integrations: []
  resolved_integrations: {}
notes:
- Repro guard for slash-command over-selection beyond /model. A prose capability
  question should be answered conversationally instead of executing /tools.
- Prompt is sent verbatim; do not normalize punctuation.
turn:
  expected_kind: agent
policy:
  executes_terminal_action: false
planned_actions:
- kind: assistant_handoff
  content: chat:tool_capability_question
  source: llm
response_contract:
  must_contain_any:
  - tools
  - integrations
  - investigate
  must_not_contain:
  - $ /
  - can't help
  - cannot help
history:
  expected:
  - type: cli_agent
    ok: true
runs: 3
tool_actions:
- surface: gather
  tools:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
  expect: not_called
